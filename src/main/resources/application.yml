spring:
  application:
    name: S-Platform
  profiles:
    default: local
  security:
    user:
      name: user
      password: user
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  docker:
    compose:
      enabled: false

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: strict

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  downloader:
    output-dir: downloads
    yt-dlp-path: bin/yt-dlp.exe
    ffmpeg-path: bin/ffmpeg.exe
  ui:
    admin-url: http://localhost:5173/app/admin
    downloader-url: http://localhost:5173/app/downloader
  security:
    master-key: ${APP_MASTER_KEY:dev-master-key-change-me}
  worker:
    enabled: true
    redis-enabled: false
    worker-id: ${HOSTNAME:${COMPUTERNAME:local-worker}}
    stream-key: download-jobs
    consumer-group: platform-workers
    concurrency: 4
    provider-limits:
      youtube: 2
      tiktok: 1
      instagram: 1
      facebook: 1
    resolve-timeout-seconds: 30
    download-timeout-minutes: 30
    post-process-timeout-minutes: 10
    retry-backoff-seconds: 60,300,900

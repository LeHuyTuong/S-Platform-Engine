spring:
  application:
    name: S-Platform
  security:
    user:
      name: user
      password: user
  datasource:
    url: jdbc:mysql://localhost:3306/platform_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update # Use update for auto-generating tables during dev
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

server:
  port: 8080

spring:
  application:
    name: S-Platform
  security:
    user:
      name: user
      password: user
  datasource:
    url: jdbc:h2:mem:platform;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

server:
  port: 8080
  servlet:
    session:
      timeout: 30m          # RuntimeSettings tự xoá sau 30 phút không hoạt động
      cookie:
        http-only: true     # Ngăn JavaScript đọc session cookie
        same-site: strict   # Chống CSRF cross-site

app:
  downloader:
    output-dir: downloads
    yt-dlp-path: bin/yt-dlp.exe
    ffmpeg-path: bin/ffmpeg.exe
  # Telegram Bot Token để rỗng — cấu hình tại runtime qua UI (không hardcode)
  telegram:
    bot-token: ""           # KHÔNG điền ở đây — dùng tính năng "Cài đặt kết nối" trên UI
  # Base URL default — có thể override qua RuntimeSettings UI mà không cần restart
  base-url: "http://localhost:8080"

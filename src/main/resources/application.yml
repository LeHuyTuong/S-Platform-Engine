spring:
  application:
    name: S-Platform
  security:
    user:
      name: user
      password: user
  datasource:
    url: jdbc:mysql://localhost:3306/platform_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update # Use update for auto-generating tables during dev
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

server:
  port: 8080

app:
  downloader:
    output-dir: downloads
  # Telegram Bot notification (Feature 3)
  # Tạo bot qua @BotFather trên Telegram, lấy token ở đây
  telegram:
    bot-token: ""   # Ví dụ: "123456789:AAHxxxxxxxxxxxxxx"
  # Base URL để build download link trong Telegram message
  base-url: "http://localhost:8080"

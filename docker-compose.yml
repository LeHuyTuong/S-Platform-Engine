services:
  api:
    build: .
    container_name: platform_api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://platform_mysql:3306/platform_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=platform_redis
      - APP_DOWNLOADER_OUTPUT_DIR=/app/downloads
      - APP_WORKER_ENABLED=false
    volumes:
      - ./yt-downloads:/app/downloads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    build: .
    container_name: platform_worker
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://platform_mysql:3306/platform_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=platform_redis
      - APP_DOWNLOADER_OUTPUT_DIR=/app/downloads
      - APP_WORKER_ENABLED=true
      - SPRING_FLYWAY_ENABLED=false
    volumes:
      - ./yt-downloads:/app/downloads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: platform_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: platform_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:alpine
    container_name: platform_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
